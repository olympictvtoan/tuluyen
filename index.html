<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảo trì hệ thống</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Be Vietnam Pro',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0C1B33 0%,#1a3a5c 40%,#2d5a8e 100%);overflow:hidden;position:relative;}

/* Floating particles */
.particle{position:absolute;border-radius:50%;opacity:0.1;animation:float 20s infinite ease-in-out;}
.particle:nth-child(1){width:200px;height:200px;background:#D4A012;top:-50px;right:-50px;animation-delay:0s;}
.particle:nth-child(2){width:150px;height:150px;background:#2980B9;bottom:-40px;left:-40px;animation-delay:5s;}
.particle:nth-child(3){width:100px;height:100px;background:#fff;top:50%;left:10%;animation-delay:10s;}
.particle:nth-child(4){width:120px;height:120px;background:#D4A012;bottom:20%;right:10%;animation-delay:7s;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}25%{transform:translateY(-30px) rotate(5deg);}50%{transform:translateY(10px) rotate(-3deg);}75%{transform:translateY(-15px) rotate(2deg);};}

.card{background:white;border-radius:24px;padding:2.5rem 2.5rem;max-width:480px;width:90%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.05);position:relative;z-index:2;animation:cardIn 0.8s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}

.notice-box{background:linear-gradient(135deg,#FFF8E1,#FFFDE7);border:2px solid #FFD54F;border-radius:16px;padding:1.8rem 1.5rem;margin-bottom:1.5rem;}
.notice-icon{font-size:2.5rem;margin-bottom:0.75rem;display:block;}
.notice-title{font-size:1.15rem;font-weight:700;color:#2980B9;margin-bottom:0.75rem;}
.notice-text{font-size:0.95rem;color:#5D4037;line-height:1.75;}

.gear-animation{display:flex;justify-content:center;gap:5px;margin:1.5rem 0;}
.gear-dot{width:9px;height:9px;border-radius:50%;background:#2980B9;animation:dotBounce 1.4s infinite ease-in-out;}
.gear-dot:nth-child(2){animation-delay:0.2s;}
.gear-dot:nth-child(3){animation-delay:0.4s;}
.gear-dot:nth-child(4){animation-delay:0.6s;}
.gear-dot:nth-child(5){animation-delay:0.8s;}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1.2);opacity:1;}}
</style>
</head>
<body>

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<div class="card">
  <div class="notice-box">
    <span class="notice-icon">🔧</span>
    <div class="notice-title">Hệ thống đang nâng cấp</div>
    <div class="notice-text">
      Hệ thống hiện đang tạm dừng để bảo trì,<br>
      xin vui lòng quay lại sau.
    </div>
  </div>

  <div class="gear-animation">
    <div class="gear-dot"></div>
    <div class="gear-dot"></div>
    <div class="gear-dot"></div>
    <div class="gear-dot"></div>
    <div class="gear-dot"></div>
  </div>

  <div style="font-size:0.95rem;color:#718096;font-weight:500;">Trân trọng cảm ơn!</div>
</div>

</body>
</html>
